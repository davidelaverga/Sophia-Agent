# Sophia MVP — Render Blueprint
# Push this file to trigger automatic service creation on Render.
# Set env vars in Render Dashboard → Environment tab (or use env groups).

services:
  # ─────────────────────────────────────────────────────────────────
  # 1. LangGraph Backend (sophia_companion agent)
  # ─────────────────────────────────────────────────────────────────
  - type: web
    name: sophia-langgraph
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.langgraph
    dockerContext: .
    plan: standard
    region: oregon
    numInstances: 1
    healthCheckPath: /ok
    # Render persistent disks are scoped to a single service; this disk only
    # backs the LangGraph service's own DEER_FLOW_HOME state.
    disk:
      name: sophia-langgraph-state
      mountPath: /var/lib/deerflow
      sizeGB: 10
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: LANGGRAPH_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: DEER_FLOW_HOME
        value: /var/lib/deerflow
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: SOPHIA_GATEWAY_INTERNAL_URL
        fromService:
          name: sophia-gateway
          type: web
          property: url
      # NOTE: the secret is generated on the gateway (see below) and
      # referenced here via fromService.envVarKey so both services
      # authenticate against an identical value. Do NOT use generateValue
      # here — Render would produce a different random string per service.
      - key: SOPHIA_INTERNAL_SECRET
        fromService:
          name: sophia-gateway
          type: web
          envVarKey: SOPHIA_INTERNAL_SECRET

  # ─────────────────────────────────────────────────────────────────
  # 2. Gateway API (REST + SSE proxy)
  # ─────────────────────────────────────────────────────────────────
  - type: web
    name: sophia-gateway
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.gateway
    dockerContext: .
    plan: starter
    region: oregon
    numInstances: 1
    healthCheckPath: /health
    # This disk is separate from sophia-langgraph-state, so channel media that
    # must reach LangGraph cannot rely on cross-service local file visibility.
    disk:
      name: sophia-gateway-state
      mountPath: /var/lib/deerflow
      sizeGB: 10
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API_SECRET
        sync: false
      - key: LANGGRAPH_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: DEER_FLOW_HOME
        value: /var/lib/deerflow
      - key: VOICE_SERVER_URL
        sync: false
      # Canonical generator for SOPHIA_INTERNAL_SECRET. sophia-langgraph
      # pulls the same value via fromService.envVarKey above so both
      # services authenticate against an identical shared secret.
      - key: SOPHIA_INTERNAL_SECRET
        generateValue: true

  # ─────────────────────────────────────────────────────────────────
  # 3. Voice Server (Vision Agents — STT + TTS + WebRTC)
  # ─────────────────────────────────────────────────────────────────
  - type: web
    name: sophia-voice
    runtime: docker
    dockerfilePath: ./voice/Dockerfile
    dockerContext: .
    plan: standard
    region: oregon
    envVars:
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: SOPHIA_VOICE_ID
        sync: false
      - key: SOPHIA_BACKEND_MODE
        value: deerflow
      - key: SOPHIA_LANGGRAPH_BASE_URL
        sync: false
      - key: SOPHIA_ASSISTANT_ID
        value: sophia_companion
      - key: SOPHIA_DEEPGRAM_MODEL
        value: flux-general-en
      - key: SOPHIA_PLATFORM
        value: voice
      - key: SOPHIA_CONTEXT_MODE
        value: life
