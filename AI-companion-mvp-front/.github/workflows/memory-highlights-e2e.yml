name: Memory Highlights E2E

on:
  pull_request:
    paths:
      - 'tests/e2e/memory-highlights.spec.ts'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - '.github/workflows/memory-highlights-e2e.yml'
  workflow_dispatch:

jobs:
  memory-highlights:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: AI-companion-mvp-front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AI-companion-mvp-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run memory highlights E2E
        env:
          CI: 'true'
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-memory-highlights
          path: AI-companion-mvp-front/playwright-report
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-memory-highlights
          path: AI-companion-mvp-front/test-results
          if-no-files-found: ignore
