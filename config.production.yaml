# Sophia MVP — Production Configuration for Render
# Used by Dockerfile.langgraph and Dockerfile.gateway
# API keys resolve from Render environment variables at runtime

config_version: 2

models:
  - name: claude-haiku-4-5-20251001
    display_name: Claude Haiku 4.5
    use: langchain_anthropic:ChatAnthropic
    model: claude-haiku-4-5-20251001
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 4096
    temperature: 1.0

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
# In Render production this sandbox only sees the langgraph service's local
# DEER_FLOW_HOME. Channel-originated Telegram attachments therefore need inline
# transport instead of gateway-local /mnt/user-data/uploads references.

tool_groups:
  - name: web

tools:
  - name: web_search
    group: web
    use: deerflow.community.tavily.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

skills:
  path: ../skills
  container_path: /mnt/skills

subagents:
  enabled: true

memory:
  enabled: false

summarization:
  enabled: false

# IM channels (used by gateway ChannelService)
# Note: config values with $VAR are resolved at app startup, so these env vars
# must be available anywhere this config file is loaded.
# Telegram media delivery in this topology relies on inline image/document
# blocks for supported attachments rather than shared local upload paths.
channels:
  langgraph_url: $LANGGRAPH_URL
  gateway_url: http://localhost:8001
  telegram:
    enabled: true
    bot_token: $TELEGRAM_BOT_TOKEN
    bot_username: $TELEGRAM_BOT_USERNAME
    allowed_users: []
