# Sophia MVP — Production Configuration for Render
# Used by Dockerfile.langgraph and Dockerfile.gateway
# API keys resolve from Render environment variables at runtime

config_version: 2

models:
  - name: claude-haiku-4-5-20251001
    display_name: Claude Haiku 4.5
    use: langchain_anthropic:ChatAnthropic
    model: claude-haiku-4-5-20251001
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 4096
    temperature: 1.0

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

skills:
  path: ../skills
  container_path: /mnt/skills

subagents:
  enabled: true

memory:
  enabled: false

summarization:
  enabled: true
  trigger:
    type: messages
    value: 10
  keep:
    type: messages
    value: 4

channels:
  # ChannelManager dispatches inbound IM messages to the LangGraph runtime via
  # this URL. On Render the gateway service has LANGGRAPH_URL set in env to the
  # internal hostname of the sophia-langgraph service.
  langgraph_url: $LANGGRAPH_URL
  telegram:
    enabled: true
    bot_token: $TELEGRAM_BOT_TOKEN
    session:
      assistant_id: sophia_companion
      context:
        platform: text
        context_mode: life
    # bot_username (e.g. Sophia_EI_bot) is read from the TELEGRAM_BOT_USERNAME
    # env var by app.gateway.telegram_link_store — no need to pass it here.
    # allowed_users: []  # empty = allow any Telegram user
