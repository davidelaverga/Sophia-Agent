name: Memory Highlights E2E

on:
  pull_request:
    paths:
      - 'frontend/tests/e2e/memory-highlights.spec.ts'
      - 'frontend/playwright.config.ts'
      - 'frontend/package.json'
      - 'frontend/pnpm-lock.yaml'
      - 'frontend/src/**'
      - '.github/workflows/memory-highlights-e2e.yml'
  workflow_dispatch:

jobs:
  memory-highlights:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run memory highlights E2E
        env:
          CI: 'true'
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3000
        run: pnpm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-memory-highlights
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-memory-highlights
          path: frontend/test-results
          if-no-files-found: ignore
